<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 48" fill="none">
  <style>
    @keyframes spoke-glow {
      0%, 100% { opacity: 1; }
      6.25%    { opacity: 0.28; }
      93.75%   { opacity: 0.28; }
    }
    .spoke {
      animation: spoke-glow 4s ease-in-out infinite;
      fill: #0a0a0a;
    }
    .s0 { animation-delay: 0s; }
    .s1 { animation-delay: -3.5s; }
    .s2 { animation-delay: -3s; }
    .s3 { animation-delay: -2.5s; }
    .s4 { animation-delay: -2s; }
    .s5 { animation-delay: -1.5s; }
    .s6 { animation-delay: -1s; }
    .s7 { animation-delay: -0.5s; }
  </style>

  <!-- 8-spoke sigil mark, clockwise from 12 o'clock -->
  <path class="spoke s0" fill-rule="evenodd" clip-rule="evenodd" d="M18.5 19V4L21.5 4V19H18.5Z"/>
  <path class="spoke s1" fill-rule="evenodd" clip-rule="evenodd" d="M22.4754 19.404L33.082 8.79736L35.2034 10.9187L26.7181 19.404L22.4754 19.404Z"/>
  <path class="spoke s2" fill-rule="evenodd" clip-rule="evenodd" d="M18.5 22.5L40 22.5V25.5L18.5 25.5V22.5Z"/>
  <path class="spoke s3" fill-rule="evenodd" clip-rule="evenodd" d="M26.7178 28.5963L35.2031 37.0815L33.0818 39.2029L22.4752 28.5963H26.7178Z"/>
  <path class="spoke s4" fill-rule="evenodd" clip-rule="evenodd" d="M18.5 44V29H21.5V44H18.5Z"/>
  <path class="spoke s5" fill-rule="evenodd" clip-rule="evenodd" d="M4.79776 37.0816L15.4044 26.475L17.5257 28.5964L6.91908 39.203L4.79776 37.0816Z"/>
  <path class="spoke s6" fill-rule="evenodd" clip-rule="evenodd" d="M2.62269e-07 22.5L15 22.5V25.5L0 25.5L2.62269e-07 22.5Z"/>
  <path class="spoke s7" fill-rule="evenodd" clip-rule="evenodd" d="M6.91885 8.79727L17.5255 19.4039L15.4041 21.5252L4.79753 10.9186L6.91885 8.79727Z"/>

  <!-- Wordmark -->
  <text x="52" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" letter-spacing="-0.5" fill="#0a0a0a">sigil</text>
</svg>
